services:
  - type: web
    name: devcon-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 18.20.8
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_SECRET
        sync: false

  - type: static
    name: devcon-client
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: NODE_VERSION
        value: 18.20.8
      - key: REACT_APP_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
